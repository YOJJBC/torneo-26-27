<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Gran Torneo ( Temporada 26 / 27 )</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark">

    <!-- HEADER -->
    <header>
        <!-- BOTÓN SOL/LUNA (vacío para evitar doble icono) -->
        <button id="toggle-mode"></button>

        <h1>Torneo 26/27</h1>
    </header>

    <!-- MENÚ -->
    <nav>
        <button onclick="mostrarSeccion('calendario')">📅 Calendario</button>
        <button onclick="mostrarSeccion('clasificacion')">📊 Clasificación</button>
        <button onclick="mostrarSeccion('resultados')">⚽ Resultados</button>
        <button onclick="mostrarSeccion('iframe')">📺 Iframe</button>
    </nav>

    <!-- CONTENIDO -->
    <main>

        <div id="calendario" class="seccion">
            <h2>Calendario</h2>
            <p>Aquí irá el calendario del torneo.</p>
        </div>

        <div id="clasificacion" class="seccion">
            <h2>Clasificación</h2>
            <p>Aquí irá la tabla de clasificación.</p>
        </div>

        <div id="resultados" class="seccion">
            <h2>Resultados</h2>
            <p>Aquí irán los resultados de los partidos.</p>
        </div>

        <div id="iframe" class="seccion">
            <h2>Iframe</h2>
            <iframe src="https://yojjbc.github.io/torneo-26-27"></iframe>
        </div>

    </main>

    <!-- SCRIPT -->
    <script>
        // Mostrar secciones
        function mostrarSeccion(id) {
            document.querySelectorAll('.seccion').forEach(sec => {
                sec.style.display = "none";
                sec.style.opacity = 0;
            });

            const s = document.getElementById(id);
            s.style.display = "block";
            setTimeout(() => s.style.opacity = 1, 50);
        }

        // Modo claro / oscuro
        const toggle = document.getElementById("toggle-mode");

        toggle.addEventListener("click", () => {
            document.body.classList.toggle("light");
            document.body.classList.toggle("dark");
        });
    </script>

</body>
</html>
